version: '3.9'

services:
  # ═══════════════════════════════════════════════════════════════════════════
  # MONGODB DATABASE
  # ═══════════════════════════════════════════════════════════════════════════
  mongodb:
    image: mongo:7.0
    container_name: bus-tracker-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: bus-tracking
      # ✅ SECURITY: Change these for production!
      # MONGO_INITDB_ROOT_USERNAME: admin
      # MONGO_INITDB_ROOT_PASSWORD: generate_secure_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - bus-tracker-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════════════════════════════
  # BACKEND API SERVER
  # ═══════════════════════════════════════════════════════════════════════════
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bus-tracker-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGODB_URI: mongodb://mongodb:27017/bus-tracking
      CLIENT_ORIGIN: http://localhost:3001
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend/.env:/app/.env:ro
    networks:
      - bus-tracker-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ═══════════════════════════════════════════════════════════════════════════
  # FRONTEND WEB SERVER
  # ═══════════════════════════════════════════════════════════════════════════
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bus-tracker-frontend
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      VITE_API_URL: http://backend:5000/api
      VITE_SOCKET_URL: http://backend:5000
    depends_on:
      - backend
    networks:
      - bus-tracker-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  bus-tracker-network:
    driver: bridge

# ═════════════════════════════════════════════════════════════════════════════
# PRODUCTION CHECKLIST:
# 
# ✓ Set MONGO_INITDB_ROOT_USERNAME and PASSWORD
# ✓ Update CLIENT_ORIGIN to production domain
# ✓ Use .env.production file
# ✓ Set up environment variables for SSL/TLS
# ✓ Configure backups for MongoDB volume
# ✓ Set resource limits (memory, CPU)
# ✓ Use external logging service
# ✓ Set up monitoring and alerts
# 
# ═════════════════════════════════════════════════════════════════════════════

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bus-tracker-backend
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: mongodb://admin:admin123@mongodb:27017/bus-tracking
      TOKEN_SECRET: dev-secret-key-2024
      PIN_SALT: dev-pin-salt-2024
      CORS_ORIGIN: http://localhost:3000,http://localhost:5173,http://localhost:8080
      LOG_LEVEL: debug
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    volumes:
      - ./backend:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    image: node:18-alpine
    container_name: bus-tracker-frontend
    working_dir: /app
    command: npm run dev
    environment:
      VITE_API_URL: http://localhost:5000
      VITE_SOCKET_URL: http://localhost:5000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    name: bus-tracker-network
